spring.application.name=retail-inventory-system

# MySQL Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/retail_inventory_db
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server port (optional, default is 8080)
server.port=8080
logging.level.org.springframework.security=DEBUG
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.operationsSorter=
jwt.secret=RetailInventorySystemSuperSecretKeyForJWTSigning2026ChangeThisInProduction
